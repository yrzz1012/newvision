<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>3D 漫游</title>
<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f}iframe{position:fixed;inset:0;width:100%;height:100%;border:none}</style>
</head>
<body>
<iframe id="splat" allow="fullscreen;xr-spatial-tracking"></iframe>
<script>
var url=new URL(location.href);
var id=url.searchParams.get('splatId');
document.getElementById('splat').src=id?'https://superspl.at/s?id='+id:'about:blank';
</script>
</body>
</html>
